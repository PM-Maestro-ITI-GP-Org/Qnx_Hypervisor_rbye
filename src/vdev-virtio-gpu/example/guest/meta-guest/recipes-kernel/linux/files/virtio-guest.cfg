# virtio (MMIO) guest support for running under qvm
CONFIG_VIRTIO=y
CONFIG_VIRTIO_MENU=y
CONFIG_VIRTIO_MMIO=y
CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
CONFIG_VIRTIO_CONSOLE=y
CONFIG_HVC_DRIVER=y

# virtio-gpu: paravirtual GPU served by the qvm vdev-virtio-gpu backend. The DRM
# virtio-gpu driver negotiates VIRGL (3D) when the device advertises
# VIRTIO_GPU_F_VIRGL (our vdev does) -> guest Mesa virgl renders on the host V3D.
CONFIG_DRM=y
CONFIG_DRM_VIRTIO_GPU=y
CONFIG_DRM_FBDEV_EMULATION=y

# PL011 console (qvm provides a virtual PL011 as the guest console)
CONFIG_SERIAL_AMBA_PL011=y
CONFIG_SERIAL_AMBA_PL011_CONSOLE=y

# Initramfs as root
CONFIG_BLK_DEV_INITRD=y
CONFIG_BLK_DEV_RAM=y
