# wpa_supplicant configuration for the RPi5 host WiFi.
#
# Staged into the host IFS as /etc/wpa_supplicant.conf and passed to wpa_supplicant with
# -c by /scripts/wifi-start.sh.
#
# The driver is devs-qwdi_dhd_sdio-2_11-rpi5.so — the "2_11" in that name is the
# wpa_supplicant version it speaks to over QWDI. Use wpa_supplicant 2.11; an older or
# newer supplicant is not guaranteed to match this driver's interface.

ctrl_interface=/var/run/wpa_supplicant
ctrl_interface_group=0

# Let wpa_cli / wpa_supplicant write credentials back to this file (e.g. after
# "wpa_cli save_config"). Note /etc in the IFS is read-only, so to make changes persist
# you would point -c at a copy on the data partition instead.
update_config=1

# Regulatory domain. Set this to your ISO 3166 country code — it decides which channels
# and TX power the CLM allows. Wrong country is a common cause of "the AP is invisible".
country=US


# ---------------------------------------------------------------------------------
# PLACEHOLDER NETWORK — replace ssid and psk with the real ones.
#
# Do not commit a real passphrase here: this file is baked into the host IFS, which
# ships on the SD card image. Prefer generating the hashed form:
#
#     wpa_passphrase "YourSSID" "YourPassphrase"
#
# and pasting the resulting psk=<64 hex chars> line (no quotes) in place of the
# plaintext psk below.
# ---------------------------------------------------------------------------------
network={
    ssid="CHANGEME_SSID"
    psk="CHANGEME_PASSPHRASE"
    key_mgmt=WPA-PSK
    scan_ssid=1
}
