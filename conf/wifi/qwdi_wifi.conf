# Driver configuration for devs-qwdi_dhd_sdio-2_11-rpi5.so
# (Cypress/Infineon CYW43455 WiFi over SDIO — the RPi5 on-board radio).
#
# Staged into the host IFS as /etc/qwdi_wifi.conf, which is the path the driver reads by
# default. Override it from iosock.conf with:  dev.qwdi_wifi.conf="/some/other/path"
#
# Option names come from the driver's own usage text (strings on the .so). NOTE: they are
# NOT the fw_path/nvram_path/clm_path names documented for the PCIe variant
# (devs-qwdi_syn_dhd_pcie) — that is a different driver with a different parser.
#
#   fw          firmware blob        default /etc/firmware/firmware.bcm4339.bcm.default.bin
#   nvram       NVRAM/calibration    default /etc/firmware/nvram.bcm4339.default.txt
#   clm_blob    country locale matrix default /etc/firmware/bcm4339.default.clm_blob
#
# The defaults are for a bcm4339; the RPi5 is a 43455, so all three are set explicitly.
#
# The blobs come from the com.qnx.qnx800.target.driver.cypress_dhd_sdio package (listed in
# qsc_install_packages.list). rpi5-hypervisor.build stages them from
# $QNX_TARGET/etc/firmware/bcm43455_firmware_pkg/ to the paths below. If the package has not
# been installed yet the driver loads and then fails to bring the radio up — see
# conf/wifi/README.md.
fw=/etc/firmware/brcmfmac43455-sdio.bin
nvram=/etc/firmware/brcmfmac43455-sdio.txt
clm_blob=/etc/firmware/brcmfmac43455-sdio.clm_blob

# Verbosity. Raise these when debugging association problems:
#   dhd_verbose=0x400801  enables DHD_FWLOG_VAL | DHD_EVENT_VAL | DHD_ERROR_VAL
#   qwdi_dbg_level=0-11   logs the QWDI channel used to talk to wpa_supplicant
dhd_verbose=0x0001
sdio_verbose=0x0001
qwdi_dbg_level=0
