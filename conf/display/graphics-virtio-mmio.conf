# QNX Screen config for the paravirtual virtio-gpu (MMIO transport).
#
# Pairs with the host-side vdev-virtio-gpu.so (see src/vdev-virtio-gpu/), which
# exposes a standard virtio-gpu device to this guest and forwards guest GL
# (SUBMIT_3D) into virglrenderer on the host V3D. The guest side is Mesa's virgl
# gallium driver on top of the QNX drm-virtio DRM/KMS driver -- NO PCI required;
# drm-virtio attaches to the virtio-gpu over MMIO (see graphics-virtio-start.sh).
#
# Prereqs (guest startup order):
#   1. drm-virtio bound to the MMIO vdev  ->  /dev/dri/card0
#   2. screen -c <this file>              ->  /dev/screen
# Then GL apps (e.g. gles2-gears) run against /dev/screen as usual.
#
# Derived from qnx-screen-virtio-8.0.4-r1 graphics-virtio-virgl.conf; the only
# change is an explicit video-mode matching the vdev's scanout-width/height
# (1024x600). Comment video-mode out to auto-pick the connector's preferred mode
# (the vdev synthesizes an EDID from the host Screen mode, so auto works too).

begin khronos

  begin egl display 1
    egl-dlls = virtio_dri.so EGL-mesa.so
    glesv2-dlls = virtio_dri.so GLESv2-mesa.so
    gpu-dlls = virtio_dri.so gpu_virtio.so
    vk-icds = virtio_icd.json
    # Legacy allocation: virtgpu 3D resources allocated directly (no blob /
    # host-visible regions -- the vdev advertises none, and intercepts SHM_LEN).
    alloc-mode = legacy
  end egl display

  # Required with alloc-mode=legacy: guest CPU mappings of screen buffers are not
  # kept coherent with their host copies without an explicit transfer.
  explicit-screen-buffer-coherency=true

  begin wfd device 1
    # Order matters: libwfdcfg-virtio.so (SONAME libwfdcfg.so.0) must load before
    # libWFDvirtio.so, which NEEDs libwfdcfg.so.0.
    wfd-dlls = libwfdcfg-virtio.so libWFDvirtio.so
  end wfd device

end khronos

begin winmgr

  begin globals
    blit-config = gles2blt
    alloc-config = alloc-virtio-virgl
  end globals

  begin display 1
    # MUST match the physical panel (1024x600), the vdev scanout-width/height, and the
    # host display-1 video-mode (graphics-rpi5-2xhdmi.conf). The vdev scans out 1:1
    # with no scaling, so any mismatch shows the guest in only a corner of the display.
    video-mode = 1024 x 600 @ 60
    defer-framebuffer-creation = false
    force-composition = true
    allow-bypass = false
  end display

  begin class framebuffer-1
    display = 1
    format = rgbx8888
    usage = gles2blt
    buffer-count = 4
  end class

end winmgr
