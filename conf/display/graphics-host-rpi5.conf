# QNX Screen config for the RPi5 HOST (native V3D via drm-rpi5).
#
# Repo-versioned replacement for the SDP's graphics-rpi5-2xhdmi.conf so the host
# display modes live with the rest of the project config. Staged into the host image
# and launched by host-graphics-start.sh (see rpi5-hypervisor.build).
#
# IMPORTANT: each display's video-mode MUST match the physical panel on that HDMI.
#   - display 1 = the guest's HDMI (qvmconf `scanout-display 1`). It MUST also equal
#     the guest's scanout-width/height and graphics-virtio-mmio.conf video-mode, because
#     vdev-virtio-gpu scans the guest out 1:1 (no scaling) into a Screen window on this
#     display. A mismatch shows the guest in only a corner of the display.
#   - display 2 = the host's second HDMI. Set it to whatever panel is attached there.

begin khronos
  begin egl display 1
    egl-dlls = v3d_dri.so EGL-mesa.so
    glesv2-dlls = v3d_dri.so GLESv2-mesa.so
    gpu-dlls = v3d_dri.so gpu_rpi5.so
    vk-icds = broadcom_icd.json
    vk-exps = /usr/lib/graphics/vulkan/VkLayer_khronos_validation.json

    # alloc-surface: "auto" = linearity follows usage flags; "linear" = all linear.
    alloc-surface = auto
  end egl display

  begin wfd device 3
    wfd-dlls = libwfdcfg-rpi5.so libWFDrpi5.so
    display-ids = 1, 2
  end wfd device
end khronos

begin winmgr
  begin globals
    default-display = 1
    stack-size = 262144
    blit-config = gles2blt
    alloc-config = alloc-rpi5
  end globals

  begin display 1
    # Guest's HDMI panel. Keep equal to the guest scanout size (1024x600).
    video-mode = 1024 x 600 @ 60
    stack-size = 262144
    defer-framebuffer-creation = false
    force-composition = true
   end display

  begin display 2
    # Host's second HDMI. Set to the panel attached there (1920x1080 by default).
    video-mode = 1920 x 1080 @ 60
    stack-size = 262144
    defer-framebuffer-creation = false
    force-composition = true
   end display

  begin class framebuffer-1
    display = 1
    pipeline = 100
    format = rgba8888
    usage = gles2blt
  end class

  begin class framebuffer-2
    display = 2
    pipeline = 200
    format = rgba8888
    usage = gles2blt
  end class

end winmgr
